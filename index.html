<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#132238"><meta name="description" content="Plate Quest is an offline-first family road-trip license plate game.">
<link rel="manifest" href="./manifest.webmanifest"><link rel="stylesheet" href="./css/app.css">
<title>Plate Quest</title>
</head>
<body>
<header class="app-header"><div><h1>Plate Quest</h1><p id="locationText">Location updates automatically.</p></div><span id="networkStatus" class="status">Checking…</span></header>
<main>
<section class="trip-bar card"><div><span class="eyebrow">Co-op trip</span><strong id="tripName">Ready to play</strong></div><div class="button-row"><button id="newTripButton" class="primary">Start</button><button id="endTripButton" class="secondary" hidden>End</button></div></section>
<section class="stats" aria-label="Trip statistics"><article><strong id="plateCount">0</strong><span>plates</span></article><article><strong id="distanceTotal">0</strong><span>miles</span></article><article><strong id="pointTotal">0</strong><span>points</span></article><article><strong id="completionTotal">0%</strong><span>complete</span></article></section>
<section class="map-card card"><div class="compact-heading"><strong>North America</strong><div class="button-row"><button id="locateButton" class="secondary small">Locate</button><button id="fitMapButton" class="secondary small">Reset</button></div></div><div id="locationProgress" class="location-progress" hidden>Updating location…</div><div id="map" aria-label="Interactive map of North American plate jurisdictions"><svg id="mapSvg" viewBox="0 0 1200 700" role="img" aria-label="North America collection map"></svg></div><p id="mapStatus" class="hint">Loading map…</p></section>
<section class="plates card"><div class="plate-toolbar"><strong>Tap a plate to collect it</strong><input id="plateSearch" type="search" placeholder="Search"></div><div id="plateTabs" class="tabs" role="tablist" aria-label="Plate groups"></div><div id="countryGroups"></div></section>
<section class="card compact-card"><details class="settings-panel"><summary>Trip settings and data</summary><div class="settings-content"><label class="select-label">Correct current jurisdiction<select id="currentJurisdiction"><option value="">Choose state, province, or territory</option></select></label><div class="button-row settings-buttons"><button id="exportButton" class="secondary">Export JSON</button><button id="clearButton" class="danger">Clear data</button></div></div></details></section>
<section class="card compact-card"><div class="compact-heading"><strong>Collected this trip</strong></div><div id="collectedList" class="empty-state">Tap a plate or map region to collect it.</div></section>
</main>
<div id="toast" class="toast" role="status" aria-live="polite"></div>
<script src="./js/app.js" type="module"></script>
</body></html>
